# Workflow:
#   ./download-cache.sh                          # one-time: populate ~/tmp/docker-cache/
#   ./docker-build.sh                            # builds base (once) + server
#   docker compose up                            # start
#
# Or step-by-step:
#   ./download-cache.sh
#   docker build -f Dockerfile.base -t criradio-base:latest .   # one-time
#   docker compose up --build                                    # rebuilds server only
#
# Then on the host (needs ffplay):  go run ./cmd/client -server http://localhost:8080
services:
  criradio:
    build:
      context: .
      # docker-compose uses Dockerfile (server-only, FROM criradio-base:latest)
      # args:
      #   GO_VERSION: "1.24"
    image: criradio-server
    ports:
      - "8080:8080"
    environment:
      # All optional — these are the built-in defaults.
      ADDR: ":8080"
      CHANNEL_URL: "https://sk.cri.cn/905.m3u8"
      DELAY: "180s"
    restart: unless-stopped
